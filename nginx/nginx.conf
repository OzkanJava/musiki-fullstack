upstream django_backend {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 50M;

    # API istekleri Django'ya
    location /api/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Streaming endpoint için buffering kapalı — istemci gerçek zamanlı alır
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /admin/ {
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /static/ {
        alias /staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Güvenli Medya Sunumu ──────────────────────────────────────────────
    # Bu location SADECE Django'nun X-Accel-Redirect header'ı ile tetiklenir.
    # Doğrudan tarayıcı erişimi → 404 (internal direktifi)
    location /internal-media/ {
        internal;
        alias /media/;

        # Seek desteği için Range request zorunlu
        add_header Accept-Ranges bytes always;

        # Nginx dosyayı doğrudan disk'ten gönderir (zero-copy)
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        # Kimlik doğrulaması Django'da yapıldığı için içerik cache'lenmemeli
        add_header Cache-Control "private, no-store" always;

        # CORS — mobil uygulama için
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Headers "Authorization, Range" always;
        add_header Access-Control-Expose-Headers "Content-Range, Accept-Ranges, Content-Length" always;
    }
}
